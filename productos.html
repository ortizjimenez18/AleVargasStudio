    <!-- MODAL DE VERIFICACIÓN DE EDAD -->
    <div class="modal fade" id="modalEdad" tabindex="-1" aria-hidden="true" data-bs-backdrop="static"
        data-bs-keyboard="false">
        <!-- data-bs-backdrop="static" evita cerrar haciendo click afuera -->
        <!-- data-bs-keyboard="false" evita cerrar con ESC -->

        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-3">

                <h4 class="mb-3">Verificación de edad</h4>
                <p>Debes ser mayor de 18 años para continuar.</p>

                <!-- Input de fecha -->
                <div class="mb-3">
                    <label class="form-label">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento" class="form-control">
                </div>

                <!-- Botón que ejecuta la función verificarEdad -->
                <button class="btn btn-primary w-100" onclick="verificarEdad()">
                    Confirmar
                </button>

                <!-- Mensaje de error -->
                <p id="mensajeEdad" class="text-danger mt-2"></p>

            </div>
        </div>
    </div>

    <!-- JS de Bootstrap (necesario para modales y navbar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<   <!-- ERROR: hay un "<" suelto aquí que rompe el HTML -->

    <script>
        // Mostrar modal al cargar si el usuario no ha validado edad
        document.addEventListener("DOMContentLoaded", function () {

            let acceso = localStorage.getItem("acceso18"); // lee si ya pasó validación

            if (acceso !== "true") {
                let modal = new bootstrap.Modal(document.getElementById('modalEdad'));
                modal.show(); // abre el modal
            }
        });

        function verificarEdad() {

            let fecha = document.getElementById("fechaNacimiento").value; // obtiene fecha
            let mensaje = document.getElementById("mensajeEdad"); // mensaje UI

            if (!fecha) {
                mensaje.textContent = "Debes ingresar tu fecha de nacimiento";
                return;
            }

            let hoy = new Date();
            let nacimiento = new Date(fecha);

            // cálculo de edad
            let edad = hoy.getFullYear() - nacimiento.getFullYear();
            let m = hoy.getMonth() - nacimiento.getMonth();

            if (m < 0 || (m === 0 && hoy.getDate() < nacimiento.getDate())) {
                edad--;
            }

            if (edad >= 18) {

                localStorage.setItem("acceso18", "true"); // guarda acceso

                let modal = bootstrap.Modal.getInstance(document.getElementById('modalEdad'));
                modal.hide(); // cierra modal

            } else {

                mensaje.textContent = "No eres mayor de edad. Redirigiendo...";

                // redirige después de 2 segundos
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);
            }
        }

    </script>

    <!-- jQuery (usado para manipular DOM más fácil) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // Espera a que cargue el DOM
        $(document).ready(function () {

            // Carga productos desde JSON
            fetch('data/productos.json')
                .then(res => res.json())
                .then(data => {

                    let contenedor = $("#contenedorProductos");
                    contenedor.html(""); // limpia contenido

                    // Recorre cada producto
                    data.forEach(p => {

                        // Inserta HTML dinámico
                        contenedor.append(`
                <div class="col-md-4 col-lg-3">
                    <div class="card shadow text-center p-3 h-100 d-flex flex-column">

                        <!-- Imagen del producto -->
                        <img src="${p.imagen}" 
                             class="img-fluid mb-3"
                             style="height:200px; object-fit:cover; border-radius:10px;">

                        <!-- Nombre -->
                        <h5>${p.nombre}</h5>

                        <!-- Precio -->
                        <p class="precio-producto fw-bold"">${p.precio}</p>

                        <!-- Botón de compra vía WhatsApp -->
                        <a href="https://wa.me/50686321517?text=Hola,%20quiero%20información%20del%20producto:%20${encodeURIComponent(p.nombre)}"
                           target="_blank"
                           class="btn btn-primary mt-auto">
                           Comprar
                        </a>

                    </div>
                </div>
            `);
                    });

                })
                .catch(error => console.error("Error cargando productos:", error));

        });
    </script>
