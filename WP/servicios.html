    <!-- SCRIPT: carrusel automático de imágenes -->
    <script>
        const carousels = document.querySelectorAll('.card-carousel'); // Selecciona todos los carruseles

        carousels.forEach(carousel => {
            const images = carousel.querySelectorAll('img'); // Obtiene imágenes dentro del carrusel

            if (images.length <= 1) return; // Si solo hay una imagen, no hace nada

            let index = 0; // Índice inicial

            setInterval(() => {
                index = (index + 1) % images.length; // Avanza en loop

                carousel.scrollTo({
                    left: carousel.clientWidth * index, // Desplaza horizontalmente
                    behavior: 'smooth' // Animación suave
                });
            }, 3000); // Cada 3 segundos
        });
    </script>

    <!-- Archivo JS externo -->
    <script src="js/servicios.js"></script>

    </script> <!-- ⚠️ Este cierre está extra (no hace nada, pero tampoco rompe todo) -->

    <!-- Bootstrap otra vez (innecesario duplicado, pero no lo toco como pediste) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT: cargar servicios desde JSON -->
    <script>
function cargarServicios() {

    // Llamada al archivo JSON local
    fetch('data/servicios.json')
    .then(response => response.json()) // Convierte a objeto JS
    .then(data => {

        let contenedor = document.getElementById("contenedorServicios"); // Contenedor principal
        contenedor.innerHTML = ""; // Limpia contenido previo

        // Recorre cada servicio del JSON
        data.forEach(servicio => {

            let imagenesHTML = ""; // Variable para imágenes

            // Genera HTML de imágenes
            servicio.imagenes.forEach(img => {
                imagenesHTML += `<img src="${img}">`;
            });

            // Inserta cada tarjeta en el contenedor
            contenedor.innerHTML += `
                <div class="service-card">
                    <div class="card-carousel">
                        ${imagenesHTML} <!-- Imágenes dinámicas -->
                    </div>
                    <div class="card-content">
                        <h3>${servicio.nombre}</h3> <!-- Nombre -->
                        <p>${servicio.descripcion}</p> <!-- Descripción -->
                    </div>
                </div>
            `;
        });

        // Inicializa funciones externas (carrusel + barra)
        iniciarCarruseles();
        iniciarIndicador();

    })
    .catch(error => console.error("Error:", error)); // Manejo de errores
}

// Ejecuta la función al cargar
cargarServicios();
</script>
