<!DOCTYPE html> <!-- Define el documento como HTML5 -->
<html lang="es"> <!-- Idioma principal de la página -->

<head>
    <meta charset="UTF-8"> <!-- Permite usar tildes y caracteres especiales -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Hace la web responsive -->

    <title>Ale Vargas Studio</title> <!-- Título que aparece en la pestaña -->

    <!-- Bootstrap: framework para estilos, grid y componentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS personalizado del proyecto -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Audio automático en loop -->
    <audio autoplay loop id="musica">
        <source src="assets/audio/musica.mp3" type="audio/mpeg"> <!-- Archivo de audio -->
    </audio>

    <!-- NAVBAR fija arriba -->
    <nav class="navbar navbar-expand-lg shadow fixed-top">
        <div class="container">

            <!-- Logo + nombre -->
            <a href="index.html" class="navbar-brand d-flex align-items-center fw-bold">
                <img id="logoNav" style="height:40px; width:auto; margin-right:10px;"> <!-- Logo dinámico -->
                Ale Vargas Studio
            </a>

            <!-- Botón hamburguesa (móvil) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menú de navegación -->
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto text-center">
                    <!-- Links a páginas -->
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="galeria.html">Galería</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="acercade.html">Acerca De</a></li>
                    <li class="nav-item"><a class="nav-link" href="autores.html">Autores</a></li>
                </ul>
            </div>

        </div>
    </nav>

    <!-- GALERÍA: sección principal -->
    <section id="galeria" class="galeria-section py-5">

        <div class="container">
            <h2 class="text-center mb-5">Galería</h2> <!-- Título -->

            <!-- Contenedor donde se insertan imágenes dinámicamente desde JS -->
            <div id="contenedorGaleria" class="row g-5"></div>

    </section> <!-- Fin sección galería -->

    <!-- FOOTER: pie de página -->
    <footer class="footer-glass text-center">

        <div class="container">

            <!-- Nombre de la marca -->
            <p class="footer-brand">Ale Vargas Studio</p>

            <!-- Derechos reservados -->
            <p class="footer-copy">© 2026 Ale Vargas Studio. Todos los derechos reservados.</p>

            <!-- Redes sociales -->
            <div class="social-icons">

                <!-- Botón WhatsApp -->
                <a href="https://api.whatsapp.com/send/?phone=86321517&text&type=phone_number&app_absent=0"
                    target="_blank" class="social-icon whatsapp">
                    <i class="bi bi-whatsapp"></i>
                </a>

                <!-- Botón Instagram -->
                <a href="https://www.instagram.com/alevargas_studio/" target="_blank" class="social-icon instagram">
                    <i class="bi bi-instagram"></i>
                </a>

            </div>

        </div>

    </footer>

    <!-- SCRIPT: carga datos desde JSON -->
    <script>
        fetch('data/contenido.json') // pide el archivo JSON
            .then(res => res.json()) // lo convierte a objeto JS
            .then(data => {
                document.getElementById("logoNav").src = data.navbar.logo; // coloca el logo dinámicamente
            });
    </script>

    <!-- Bootstrap JS: necesario para navbar, collapse, etc -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script personalizado de la galería -->
    <script src="js/galeria.js"></script>
</body>

</html>
